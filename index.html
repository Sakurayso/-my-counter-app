<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动计数器 & 灵感画廊</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --btn-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --danger-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 960px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card-header {
            background: var(--primary-gradient);
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .card-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .card-body {
            display: flex;
            flex-wrap: wrap;
            padding: 40px;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        .counter-section {
            flex: 1;
            min-width: 280px;
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        .counter-label {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #count-display {
            font-family: 'Poppins', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            line-height: 1;
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 30px;
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 220px;
            color: white;
            position: relative;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        #click-btn {
            background: var(--btn-gradient);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        #click-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
        }

        #reset-btn {
            background: white;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            box-shadow: none;
        }

        #reset-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .image-section {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.4s ease;
            background: #eee;
            aspect-ratio: 3/2;
            width: 100%;
            max-width: 500px;
        }

        .image-wrapper:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .network-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .network-img.loaded {
            opacity: 1;
        }

        .caption {
            margin-top: 15px;
            color: var(--text-sub);
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 768px) {
            .card-body {
                flex-direction: column;
                padding: 25px;
                gap: 30px;
            }

            .counter-section, .image-section {
                width: 100%;
            }

            #count-display {
                font-size: 4rem;
            }

            .card-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header">
        <h1>✨ 互动计数器 & 灵感画廊</h1>
    </div>

    <div class="card-body">
        <div class="counter-section">
            <div class="counter-label">当前计数</div>
            <div id="count-display">0</div>

            <div class="btn-group">
                <button id="click-btn">🚀 点击增加能量</button>
                <button id="reset-btn">🔄 重置并换图</button>
            </div>
        </div>

        <div class="image-section">
            <div class="image-wrapper">
                <img 
                    src="images/1.jpg" 
                    alt="我的图片" 
                    class="network-img"
                    id="gallery-img"
                >
            </div>
            <div class="caption"> 每次重置，邂逅新风景</div>
        </div>
    </div>
</div>

<script>
    const displayElement = document.getElementById('count-display');
    const clickButton = document.getElementById('click-btn');
    const resetButton = document.getElementById('reset-btn');
    const galleryImg = document.getElementById('gallery-img');

    let count = parseInt(localStorage.getItem('clickCount')) || 0;

    function updateDisplay() {
        displayElement.textContent = count;
        localStorage.setItem('clickCount', count);
    }

    clickButton.addEventListener('click', function() {
        count++;
        updateDisplay();
        displayElement.style.transform = "scale(1.2)";
        setTimeout(() => displayElement.style.transform = "scale(1)", 200);
    });

    // 自己的本地图片
    const images = [
        "images/1.jpg",
        "images/2.jpg",
        "images/3.jpg",
        "images/4.jpg",
        "images/5.jpg",
        "images/6.jpg",
        "images/7.jpg",
        "images/8.jpg",
        "images/9.jpg",
        "images/10.jpg",
        "images/11.jpg",
        "images/12.jpg",
        "images/13.jpg",
        "images/14.jpg",
        "images/15.jpg",
        "images/16.jpg",
        "images/17.jpg"
    ];

    resetButton.addEventListener('click', function() {
        if(confirm('确定要重置计数并更换一张新图片吗？')) {
            count = 0;
            updateDisplay();

            const randomImg = images[Math.floor(Math.random() * images.length)];
            galleryImg.classList.remove('loaded');

            setTimeout(() => {
                galleryImg.src = randomImg;
            }, 100);
        }
    });

    galleryImg.onload = function() {
        this.classList.add('loaded');
    };

    updateDisplay();
    if(galleryImg.complete) {
        galleryImg.classList.add('loaded');
    }
</script>

</body>
</html>
