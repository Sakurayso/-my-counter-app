<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动计数器与画廊</title>
    <style>
        :root {
            --primary-color: #007bff;
            --danger-color: #dc3545;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 主容器：整合所有内容的大卡片 */
        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px; /* 限制最大宽度 */
            overflow: hidden; /* 防止子元素溢出圆角 */
            display: flex;
            flex-direction: column;
        }

        /* 头部标题区 */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .card-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 内容区域：左右分栏布局 */
        .card-body {
            display: flex;
            flex-wrap: wrap; /* 允许在小屏幕换行 */
            padding: 30px;
            gap: 30px; /* 两部分之间的间距 */
            align-items: center;
            justify-content: center;
        }

        /* 左侧：计数器区域 */
        .counter-section {
            flex: 1;
            min-width: 250px;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 1px solid #e9ecef;
        }

        #count-display {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 10px 0;
            line-height: 1;
            font-variant-numeric: tabular-nums; /* 防止数字变化时宽度跳动 */
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 80%;
            max-width: 200px;
        }

        #click-btn {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
        }

        #click-btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,123,255,0.3);
        }

        #reset-btn {
            background-color: white;
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
            box-shadow: none;
        }

        #reset-btn:hover {
            background-color: var(--danger-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 右侧：图片区域 */
        .image-section {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-wrapper {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .image-wrapper:hover {
            transform: scale(1.03);
        }

        .network-img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 400px; /* 限制图片最大高度 */
            object-fit: cover;
        }

        .caption {
            margin-top: 12px;
            color: var(--text-sub);
            font-size: 0.95rem;
            text-align: center;
            font-style: italic;
        }

        /* 响应式调整：小屏幕下变为纯垂直布局 */
        @media (max-width: 768px) {
            .card-body {
                flex-direction: column;
                padding: 20px;
            }
            
            .counter-section, .image-section {
                width: 100%;
            }

            #count-display {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="main-card">
    <!-- 顶部标题 -->
    <div class="card-header">
        <h1>互动计数器 & 风景画廊</h1>
    </div>

    <!-- 主体内容：左右分栏 -->
    <div class="card-body">
        
        <!-- 左侧：计数器 -->
        <div class="counter-section">
            <h3>当前计数</h3>
            <div id="count-display">0</div>
            
            <div class="btn-group">
                <button id="click-btn">👆 点击增加</button>
                <button id="reset-btn">🔄 重置计数</button>
            </div>
        </div>

        <!-- 右侧：图片 -->
        <div class="image-section">
            <div class="image-wrapper">
                <img 
                    src="https://picsum.photos/600/400" 
                    alt="随机网络风景图" 
                    class="network-img"
                    id="gallery-img"
                >
            </div>
            <div class="caption">每次重置计数，图片也会刷新哦！</div>
        </div>

    </div>
</div>

<script>
    // 1. 获取页面元素
    const displayElement = document.getElementById('count-display');
    const clickButton = document.getElementById('click-btn');
    const resetButton = document.getElementById('reset-btn');
    const galleryImg = document.getElementById('gallery-img');

    // 2. 初始化计数
    let count = parseInt(localStorage.getItem('clickCount')) || 0;

    // 3. 更新显示函数
    function updateDisplay() {
        displayElement.textContent = count;
        localStorage.setItem('clickCount', count);
    }

    // 4. 绑定点击事件 (增加)
    clickButton.addEventListener('click', function() {
        count++;
        updateDisplay();
        
        // 可选特效：点击时数字轻微放大
        displayElement.style.transform = "scale(1.2)";
        setTimeout(() => displayElement.style.transform = "scale(1)", 200);
    });

    // 5. 绑定点击事件 (重置)
    resetButton.addEventListener('click', function() {
        if(confirm('确定要重置计数吗？\n(重置后图片也会刷新)')) {
            count = 0;
            updateDisplay();
            
            // 刷新图片：通过在 URL 后添加时间戳强制浏览器重新加载
            const timestamp = new Date().getTime();
            galleryImg.src = `https://picsum.photos/600/400?random=${timestamp}`;
        }
    });

    // 6. 页面加载初始化
    updateDisplay();
    

</script>

</body>
</html>
